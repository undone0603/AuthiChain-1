name: Deploy AuthiChainNFT Contract

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "vechain_test"
        type: choice
        options:
          - vechain_test
          - vechain_main
      grant_minter:
        description: "Grant minter role to MINTER_ADDRESS after deploy?"
        required: true
        default: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Compile contracts
        run: npm run contract:compile

      - name: Deploy contract
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          MINTER_ADDRESS: ${{ secrets.MINTER_ADDRESS }}
        run: |
          if [ "${{ github.event.inputs.network }}" = "vechain_main" ]; then
            npm run contract:deploy:mainnet
          else
            npm run contract:deploy:testnet
          fi
