name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
  workflow_dispatch:

concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  deploy-scan-validate:
    name: Deploy scan-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/scan-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Deploy to Cloudflare
        run: npx wrangler deploy

  deploy-qron-provenance:
    name: Deploy qron-provenance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/qron-provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Deploy to Cloudflare
        run: npx wrangler deploy

  deploy-license-issuer:
    name: Deploy license-issuer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/license-issuer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Deploy to Cloudflare
        run: npx wrangler deploy

  deploy-verify-worker:
    name: Deploy verify-worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/verify-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Deploy to Cloudflare
        run: npx wrangler deploy
