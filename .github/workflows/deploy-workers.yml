# why: Deploys the five Cloudflare Workers (license-issuer, qron-provenance, scan-validate, telegram, verify-worker) that execute the hot-path authentication and licensing logic at the edge.
# value: Edge deployment powers the "2.1 second" verification experience that defines AuthiChain's market promise — this workflow is how those workers reach global production without blocking the main Next.js release train.
name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
  workflow_dispatch:

concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  deploy-license-issuer:
    name: Deploy license-issuer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/license-issuer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Wrangler
        run: npm install --no-save wrangler || npm install -g wrangler
      - name: Deploy
        run: npx wrangler deploy --compatibility-date 2024-01-01
        continue-on-error: true

  deploy-qron-provenance:
    name: Deploy qron-provenance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/qron-provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Wrangler
        run: npm install --no-save wrangler || npm install -g wrangler
      - name: Deploy
        run: npx wrangler deploy --compatibility-date 2024-01-01
        continue-on-error: true

  deploy-scan-validate:
    name: Deploy scan-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/scan-validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Wrangler
        run: npm install --no-save wrangler || npm install -g wrangler
      - name: Deploy
        run: npx wrangler deploy --compatibility-date 2024-01-01
        continue-on-error: true

  deploy-telegram:
    name: Deploy telegram
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/telegram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Wrangler
        run: npm install --no-save wrangler || npm install -g wrangler
      - name: Deploy
        run: npx wrangler deploy --compatibility-date 2024-01-01
        continue-on-error: true

  deploy-verify-worker:
    name: Deploy verify-worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/verify-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Wrangler
        run: npm install --no-save wrangler || npm install -g wrangler
      - name: Deploy
        run: npx wrangler deploy --compatibility-date 2024-01-01
        continue-on-error: true

  deploy-authichain-automation:
    name: Deploy authichain-automation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/authichain-automation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Wrangler
        run: npm install --no-save wrangler || npm install -g wrangler
      - name: Deploy
        run: npx wrangler deploy --config wrangler.toml
        continue-on-error: true
