name: Deploy Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent overlapping Worker deploys
concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Cloudflare Worker

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Enable pnpm
        run: corepack enable

      # Validate required Cloudflare secrets
      - name: Validate Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "❌ Missing CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.CF_ACCOUNT_ID }}" ]; then
            echo "❌ Missing CF_ACCOUNT_ID"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Worker
        run: pnpm run build

      # Upload Worker bundle for debugging + auditability
      - name: Upload Worker bundle
        uses: actions/upload-artifact@v4
        with:
          name: worker-bundle
          path: .open-next

      - name: Deploy Worker
        run: |
          pnpm dlx wrangler deploy \
            --account-id ${{ secrets.CF_ACCOUNT_ID }} \
            --api-token ${{ secrets.CLOUDFLARE_API_TOKEN }}
