<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="bgStep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1a0a;stop-opacity:1"/>
    </linearGradient>
    <filter id="nodeShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#9333ea" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#0f0f1a" rx="16"/>

  <!-- Step 1 -->
  <g transform="translate(70, 40)">
    <!-- Card -->
    <rect width="200" height="200" rx="16" fill="url(#bgStep)" stroke="#9333ea" stroke-width="1.5" filter="url(#nodeShadow)"/>
    <!-- Step number circle -->
    <circle cx="100" cy="50" r="30" fill="url(#purpleGrad)"/>
    <text x="100" y="57" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="sans-serif">1</text>
    <!-- Upload icon -->
    <g transform="translate(75, 90)" opacity="0.9">
      <rect width="50" height="40" rx="6" fill="#2d1054" stroke="#a855f7" stroke-width="1.5"/>
      <path d="M25 30 L25 18 M25 18 L19 24 M25 18 L31 24" stroke="#c084fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="14" y1="34" x2="36" y2="34" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Label -->
    <text x="100" y="155" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="sans-serif">Upload Product</text>
    <text x="100" y="173" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="sans-serif">Photo · Description</text>
    <text x="100" y="188" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="sans-serif">Any Industry</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(285, 130)">
    <path d="M0 10 L80 10" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="80,10 68,4 68,16" fill="#7c3aed"/>
    <!-- AI label -->
    <rect x="15" y="-18" width="50" height="18" rx="9" fill="#1e0840" stroke="#9333ea" stroke-width="1"/>
    <text x="40" y="-5" text-anchor="middle" fill="#c084fc" font-size="9" font-family="monospace" font-weight="bold">AI ≪3s</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(380, 40)">
    <rect width="200" height="200" rx="16" fill="url(#bgStep)" stroke="#7c3aed" stroke-width="1.5" filter="url(#nodeShadow)"/>
    <circle cx="100" cy="50" r="30" fill="url(#purpleGrad)"/>
    <text x="100" y="57" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="sans-serif">2</text>
    <!-- Blockchain icon -->
    <g transform="translate(65, 88)" opacity="0.9">
      <rect x="0" y="10" width="28" height="22" rx="4" fill="#1e0840" stroke="#a855f7" stroke-width="1.5"/>
      <rect x="32" y="0" width="28" height="22" rx="4" fill="#1e0840" stroke="#a855f7" stroke-width="1.5"/>
      <rect x="32" y="26" width="28" height="22" rx="4" fill="#1e0840" stroke="#a855f7" stroke-width="1.5"/>
      <line x1="28" y1="21" x2="32" y2="11" stroke="#c084fc" stroke-width="1.5"/>
      <line x1="28" y1="21" x2="32" y2="37" stroke="#c084fc" stroke-width="1.5"/>
    </g>
    <text x="100" y="155" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="sans-serif">Blockchain Register</text>
    <text x="100" y="173" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="sans-serif">TrueMark™ ID</text>
    <text x="100" y="188" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="sans-serif">Immutable Record</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(595, 130)">
    <path d="M0 10 L80 10" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="80,10 68,4 68,16" fill="#16a34a"/>
    <rect x="15" y="-18" width="50" height="18" rx="9" fill="#0a1f0a" stroke="#16a34a" stroke-width="1"/>
    <text x="40" y="-5" text-anchor="middle" fill="#4ade80" font-size="9" font-family="monospace" font-weight="bold">INSTANT</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(690, 40)">
    <rect width="200" height="200" rx="16" fill="url(#bgStep)" stroke="#16a34a" stroke-width="1.5" filter="url(#nodeShadow)"/>
    <circle cx="100" cy="50" r="30" fill="url(#greenGrad)"/>
    <text x="100" y="57" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="sans-serif">3</text>
    <!-- Verify checkmark icon -->
    <g transform="translate(72, 88)" opacity="0.9">
      <circle cx="28" cy="22" r="22" fill="#0a2a0a" stroke="#16a34a" stroke-width="2"/>
      <path d="M16 22 L24 30 L40 14" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="100" y="155" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="sans-serif">Verify Anywhere</text>
    <text x="100" y="173" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="sans-serif">Public · Instant</text>
    <text x="100" y="188" text-anchor="middle" fill="#9ca3af" font-size="11" font-family="sans-serif">No Account Needed</text>
  </g>
</svg>
