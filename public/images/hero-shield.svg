<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#a855f7" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Outer orbit ring -->
  <ellipse cx="400" cy="300" rx="280" ry="230" stroke="url(#shieldGrad)" stroke-width="1" opacity="0.2" fill="none" stroke-dasharray="8 4"/>

  <!-- Middle orbit ring -->
  <ellipse cx="400" cy="300" rx="200" ry="165" stroke="url(#shieldGrad)" stroke-width="1" opacity="0.3" fill="none" stroke-dasharray="4 8"/>

  <!-- Center glow -->
  <circle cx="400" cy="300" r="180" fill="url(#centerGlow)"/>

  <!-- Blockchain nodes - floating dots -->
  <circle cx="120" cy="120" r="8" fill="#9333ea" opacity="0.7" filter="url(#glow)"/>
  <circle cx="680" cy="100" r="6" fill="#16a34a" opacity="0.7" filter="url(#glow)"/>
  <circle cx="700" cy="480" r="9" fill="#9333ea" opacity="0.6" filter="url(#glow)"/>
  <circle cx="90" cy="450" r="7" fill="#16a34a" opacity="0.6" filter="url(#glow)"/>
  <circle cx="400" cy="60" r="5" fill="#a855f7" opacity="0.8" filter="url(#glow)"/>
  <circle cx="400" cy="540" r="5" fill="#22c55e" opacity="0.8" filter="url(#glow)"/>

  <!-- Connection lines between nodes -->
  <line x1="120" y1="120" x2="400" y2="300" stroke="#9333ea" stroke-width="0.8" opacity="0.2"/>
  <line x1="680" y1="100" x2="400" y2="300" stroke="#16a34a" stroke-width="0.8" opacity="0.2"/>
  <line x1="700" y1="480" x2="400" y2="300" stroke="#9333ea" stroke-width="0.8" opacity="0.2"/>
  <line x1="90" y1="450" x2="400" y2="300" stroke="#16a34a" stroke-width="0.8" opacity="0.2"/>

  <!-- Shield shape -->
  <path d="M400 120 L520 170 L520 290 Q520 370 400 420 Q280 370 280 290 L280 170 Z"
    fill="url(#glowGrad)" stroke="url(#shieldGrad)" stroke-width="2.5" filter="url(#softGlow)"/>

  <!-- Shield inner highlight -->
  <path d="M400 140 L505 184 L505 288 Q505 355 400 400 Q295 355 295 288 L295 184 Z"
    fill="none" stroke="url(#shieldGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Check mark / lock icon in shield -->
  <g transform="translate(400, 285)" filter="url(#glow)">
    <!-- Lock body -->
    <rect x="-28" y="-10" width="56" height="42" rx="6" fill="url(#shieldGrad)" opacity="0.9"/>
    <!-- Lock shackle -->
    <path d="M-14 -10 L-14 -26 Q-14 -48 0 -48 Q14 -48 14 -26 L14 -10"
      stroke="url(#shieldGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="12" r="8" fill="#0f0f1a" opacity="0.8"/>
    <rect x="-3" y="12" width="6" height="12" rx="2" fill="#0f0f1a" opacity="0.8"/>
  </g>

  <!-- Floating blockchain blocks - left side -->
  <g transform="translate(155, 240)">
    <rect width="80" height="40" rx="6" fill="#1e1040" stroke="#9333ea" stroke-width="1.5" opacity="0.8"/>
    <text x="40" y="25" text-anchor="middle" fill="#a855f7" font-size="10" font-family="monospace" opacity="0.9">0x4f2a...</text>
  </g>
  <g transform="translate(160, 295)">
    <rect width="80" height="40" rx="6" fill="#0a1f0a" stroke="#16a34a" stroke-width="1.5" opacity="0.8"/>
    <text x="40" y="25" text-anchor="middle" fill="#22c55e" font-size="10" font-family="monospace" opacity="0.9">verified</text>
  </g>
  <line x1="195" y1="280" x2="200" y2="295" stroke="#9333ea" stroke-width="1" opacity="0.4"/>

  <!-- Floating blockchain blocks - right side -->
  <g transform="translate(565, 240)">
    <rect width="80" height="40" rx="6" fill="#1e1040" stroke="#9333ea" stroke-width="1.5" opacity="0.8"/>
    <text x="40" y="25" text-anchor="middle" fill="#a855f7" font-size="10" font-family="monospace" opacity="0.9">NFT #2847</text>
  </g>
  <g transform="translate(560, 295)">
    <rect width="80" height="40" rx="6" fill="#0a1f0a" stroke="#16a34a" stroke-width="1.5" opacity="0.8"/>
    <text x="40" y="25" text-anchor="middle" fill="#22c55e" font-size="10" font-family="monospace" opacity="0.9">authentic</text>
  </g>
  <line x1="600" y1="280" x2="595" y2="295" stroke="#16a34a" stroke-width="1" opacity="0.4"/>

  <!-- Top floating elements -->
  <g transform="translate(280, 68)">
    <rect width="240" height="36" rx="18" fill="#1e0840" stroke="#9333ea" stroke-width="1" opacity="0.7"/>
    <text x="120" y="23" text-anchor="middle" fill="#c084fc" font-size="12" font-family="monospace" font-weight="bold">AI AUTOFLOW™ ACTIVE</text>
  </g>

  <!-- Bottom trust indicators -->
  <g transform="translate(200, 470)">
    <rect width="110" height="32" rx="6" fill="#0a1f0a" stroke="#16a34a" stroke-width="1" opacity="0.8"/>
    <text x="55" y="21" text-anchor="middle" fill="#22c55e" font-size="11" font-family="monospace">✓ AUTHENTIC</text>
  </g>
  <g transform="translate(345, 470)">
    <rect width="110" height="32" rx="6" fill="#1e0840" stroke="#9333ea" stroke-width="1" opacity="0.8"/>
    <text x="55" y="21" text-anchor="middle" fill="#c084fc" font-size="11" font-family="monospace">BLOCKCHAIN</text>
  </g>
  <g transform="translate(490, 470)">
    <rect width="110" height="32" rx="6" fill="#0a1f0a" stroke="#16a34a" stroke-width="1" opacity="0.8"/>
    <text x="55" y="21" text-anchor="middle" fill="#22c55e" font-size="11" font-family="monospace">TrueMark™</text>
  </g>

  <!-- Scan beam animation line -->
  <line x1="280" y1="300" x2="520" y2="300" stroke="url(#shieldGrad)" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 4"/>
</svg>
