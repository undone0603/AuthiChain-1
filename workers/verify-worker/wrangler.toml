name = "authichain-verify-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
NEXT_PUBLIC_SITE_URL = "https://authichain.com"

# Uncomment and set via wrangler secret put SUPABASE_URL etc.
# [vars]
# SUPABASE_URL = ""
# SUPABASE_ANON_KEY = ""

[[routes]]
pattern = "authichain.com/api/verify*"
custom_domain = true

[build]
command = "npm run build"

[env.production]
name = "authichain-verify-worker"

[env.staging]
name = "authichain-verify-worker-staging"
